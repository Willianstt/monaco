// ---------- gráfico de linha simples (substitui recharts) ----------
function MiniLineChart({ data, dataKey, color, height = 150 }) {
  const width = 600;
  const padding = { top: 10, right: 10, bottom: 20, left: 8 };
  if (!data || data.length === 0) return null;
  const values = data.map((d) => Number(d[dataKey]));
  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 1;
  const innerW = width - padding.left - padding.right;
  const innerH = height - padding.top - padding.bottom;
  const points = data.map((d, i) => {
    const x = padding.left + (data.length > 1 ? (i / (data.length - 1)) * innerW : innerW / 2);
    const y = padding.top + innerH - ((Number(d[dataKey]) - min) / range) * innerH;
    return [x, y];
  });
  const pathD = points.map((p, i) => `${i === 0 ? "M" : "L"} ${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" ");
  const labelStep = Math.max(1, Math.ceil(data.length / 6));
  return (
    <svg viewBox={`0 0 ${width} ${height}`} width="100%" height={height} preserveAspectRatio="none">
      <line x1={padding.left} y1={padding.top} x2={width - padding.right} y2={padding.top} stroke="#2E2E2E" strokeWidth="1" />
      <line x1={padding.left} y1={height - padding.bottom} x2={width - padding.right} y2={height - padding.bottom} stroke="#2E2E2E" strokeWidth="1" />
      <path d={pathD} fill="none" stroke={color} strokeWidth="2" />
      {points.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r="3" fill={color} />)}
      {data.map((d, i) => (i % labelStep === 0 || i === data.length - 1) && (
        <text key={i} x={points[i][0]} y={height - 4} fontSize="9" fill="#6E6E6E" textAnchor="middle" fontFamily="JetBrains Mono, monospace">{d.date}</text>
      ))}
    </svg>
  );
}

function weekDates(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  const day = d.getDay();
  const diffToMonday = day === 0 ? -6 : 1 - day;
  const monday = new Date(d);
  monday.setDate(d.getDate() + diffToMonday);
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const dt = new Date(monday);
    dt.setDate(monday.getDate() + i);
    dates.push(dt.toISOString().slice(0, 10));
  }
  return dates;
}

function navyBodyFat({ neck, waist, heightCm }) {
  const n = Number(neck), w = Number(waist), h = Number(heightCm);
  if (!n || !w || !h || w <= n) return null;
  const bf = 495 / (1.0324 - 0.19077 * Math.log10(w - n) + 0.15456 * Math.log10(h)) - 450;
  if (!isFinite(bf) || bf <= 0 || bf > 60) return null;
  return Math.round(bf * 10) / 10;
}

function buildExerciseHistory(trainingLog, plans) {
  const idToName = {};
  plans.forEach((p) => p.exercises.forEach((ex) => { idToName[ex.id] = ex.name; }));
  const history = {};
  Object.entries(trainingLog).forEach(([date, day]) => {
    if (day.progress) {
      Object.entries(day.progress).forEach(([exId, data]) => {
        const w = Number(data.weight);
        if (!w) return;
        const name = idToName[exId] || exId;
        if (!history[name]) history[name] = [];
        history[name].push({ date, weight: w });
      });
    }
    (day.adhoc || []).forEach((a) => {
      const w = Number(a.weight);
      if (!w) return;
      if (!history[a.name]) history[a.name] = [];
      history[a.name].push({ date, weight: w });
    });
  });
  Object.values(history).forEach((arr) => arr.sort((a, b) => a.date.localeCompare(b.date)));
  return history;
}

function longestStreak(dateSet) {
  const dates = Array.from(dateSet).sort();
  let max = 0, cur = 0, prev = null;
  for (const d of dates) {
    if (prev) {
      const diff = Math.round((new Date(d + "T00:00:00") - new Date(prev + "T00:00:00")) / 86400000);
      cur = diff === 1 ? cur + 1 : 1;
    } else {
      cur = 1;
    }
    max = Math.max(max, cur);
    prev = d;
  }
  return max;
}

function compressImage(file, maxW = 320, quality = 0.6) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.start();
    osc.stop(ctx.currentTime + 0.5);
  } catch (e) {}
}

function CalorieDial({ consumed, goal }) {
  const pct = clamp(goal > 0 ? consumed / goal : 0, 0, 1.15);
  const angleRange = 260;
  const startAngle = -220;
  const sweep = angleRange * Math.min(pct, 1);
  const over = consumed > goal;
  const remaining = goal - consumed;

  const size = 220;
  const stroke = 14;
  const r = (size - stroke) / 2;
  const cx = size / 2;
  const cy = size / 2;

  const polar = (angleDeg) => {
    const rad = (angleDeg * Math.PI) / 180;
    return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
  };
  const describeArc = (a0, a1) => {
    const [x0, y0] = polar(a0);
    const [x1, y1] = polar(a1);
    const large = a1 - a0 > 180 ? 1 : 0;
    return `M ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1}`;
  };

  return (
    <div className="relative" style={{ width: size, height: size }}>
      <svg width={size} height={size}>
        <path d={describeArc(startAngle, startAngle + angleRange)} fill="none" stroke="#333333" strokeWidth={stroke} strokeLinecap="round" />
        <path d={describeArc(startAngle, startAngle + sweep)} fill="none" stroke={over ? "#FFFFFF" : "#22C55E"} strokeWidth={stroke} strokeLinecap="round" style={{ transition: "all 0.5s ease" }} />
        {Array.from({ length: 12 }).map((_, i) => {
          const a = startAngle + (angleRange / 11) * i;
          const [x1, y1] = polar(a);
          const rad = (a * Math.PI) / 180;
          const x2 = cx + (r - stroke / 2 - 6) * Math.cos(rad);
          const y2 = cy + (r - stroke / 2 - 6) * Math.sin(rad);
          return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#333333" strokeWidth="2" />;
        })}
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <span className="font-mono text-[11px] tracking-widest text-zinc-400 uppercase">{over ? "excedido" : "restam"}</span>
        <span className="font-mono text-4xl font-semibold tabular-nums" style={{ color: over ? "#FFFFFF" : "#FFFFFF" }}>{Math.abs(Math.round(remaining))}</span>
        <span className="font-mono text-[11px] text-zinc-400">kcal</span>
        <div className="mt-2 text-[11px] font-mono text-zinc-500">{Math.round(consumed)} / {goal} kcal</div>
      </div>
    </div>
  );
}

function MacroBar({ label, consumed, goal, color }) {
  const pct = clamp(goal > 0 ? (consumed / goal) * 100 : 0, 0, 100);
  const over = consumed > goal;
  return (
    <div className="flex-1 min-w-[100px]">
      <div className="flex justify-between items-baseline mb-1">
        <span className="text-[11px] font-mono uppercase tracking-wider text-zinc-400">{label}</span>
        <span className="text-[11px] font-mono text-white tabular-nums">{Math.round(consumed)}<span className="text-zinc-500">/{Math.round(goal)}g</span></span>
      </div>
      <div className="h-[7px] rounded-full bg-zinc-800 overflow-hidden">
        <div className="h-full rounded-full transition-all duration-500" style={{ width: `${pct}%`, background: over ? "#FFFFFF" : color }} />
      </div>
    </div>
  );
}

      carbs: acc.carbs + Number(f.carbs || 0),
      fat: acc.fat + Number(f.fat || 0),
    }), { kcal: 0, protein: 0, carbs: 0, fat: 0 });
  }, [dayMeals]);

  const saveProfile = async (p) => { setProfile(p); await storeSet("profile-goals", p); setShowProfile(false); };
  const addFood = async (mealId, food) => {
    const next = { ...foodLog, [date]: { ...dayMeals, [mealId]: [...(dayMeals[mealId] || []), { ...food, id: uid() }] } };
    setFoodLog(next); await storeSet("food-log", next);
  };
  const removeFood = async (mealId, id) => {
    const next = { ...foodLog, [date]: { ...dayMeals, [mealId]: (dayMeals[mealId] || []).filter((f) => f.id !== id) } };
    setFoodLog(next); await storeSet("food-log", next);
  };
  const editFood = async (mealId, id, updated) => {
    const next = { ...foodLog, [date]: { ...dayMeals, [mealId]: (dayMeals[mealId] || []).map((f) => (f.id === id ? { ...f, ...updated } : f)) } };
    setFoodLog(next); await storeSet("food-log", next);
  };
  const addCustomFood = async (food) => {
    const next = [...customFoods, { ...food, id: uid() }];
    setCustomFoods(next); await storeSet("custom-foods", next);
  };
  const removeCustomFood = async (id) => {
    const next = customFoods.filter((f) => f.id !== id);
    setCustomFoods(next); await storeSet("custom-foods", next);
  };
  const savePlans = async (next) => { setPlans(next); await storeSet("training-plans", next); };
  const addCustomExercise = async (name) => {
    if (customExercises.some((e) => normalize(e.name) === normalize(name))) return;
    const next = [...customExercises, { id: uid(), name }];
    setCustomExercises(next); await storeSet("custom-exercises", next);
  };
  const removeCustomExercise = async (id) => {
    const next = customExercises.filter((e) => e.id !== id);
    setCustomExercises(next); await storeSet("custom-exercises", next);
  };
  const saveTrainingDay = async (dayData) => {
    const next = { ...trainingLog, [date]: dayData };
    setTrainingLog(next); await storeSet("training-log", next);
  };
  const saveEvolutionDay = async (entry) => {
    const next = { ...evolutionLog, [date]: { ...(evolutionLog[date] || {}), ...entry } };
    setEvolutionLog(next); await storeSet("evolution-log", next);
  };
  const deleteEvolutionDay = async () => {
    const next = { ...evolutionLog };
    delete next[date];
    setEvolutionLog(next); await storeSet("evolution-log", next);
  };

  const shiftDate = (delta) => {
    const d = new Date(date + "T00:00:00");
    d.setDate(d.getDate() + delta);
    setDate(d.toISOString().slice(0, 10));
  };

  if (loading) {
    return <div className="min-h-screen bg-black flex items-center justify-center"><span className="font-mono text-zinc-400 text-sm tracking-widest">carregando…</span></div>;
  }

  return (
    <div className="min-h-screen bg-black text-white" style={{ fontFamily: "'Inter', system-ui, sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap');
        .font-display { font-family: 'Barlow Condensed', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
      `}</style>

      <header className="border-b border-zinc-800 bg-black">
        <div className="max-w-2xl mx-auto px-5 pt-6 pb-4">
          <div className="flex items-center justify-between">
            <div>
              <p className="font-mono text-[10px] tracking-[0.25em] text-zinc-500 uppercase">{profile.name ? `Diário de ${profile.name}` : "Diário"}</p>
              <h1 className="font-display text-3xl font-bold leading-none tracking-tight">Caderno de Treino</h1>
            </div>
            <button onClick={() => setShowProfile(true)} className="w-9 h-9 rounded-full border border-zinc-700 flex items-center justify-center hover:bg-zinc-800 transition" aria-label="Perfil e metas">
              <Settings size={16} className="text-zinc-400" />
            </button>
          </div>

          <div className="mt-5 flex items-center justify-between bg-zinc-800 rounded-xl px-3 py-2 border border-zinc-800">
            <button onClick={() => shiftDate(-1)} className="px-2 text-zinc-400 hover:text-white font-mono">‹</button>
            <div className="flex flex-col items-center">
              <span className="font-mono text-sm capitalize">{fmtDateLabel(date)}</span>
              {date !== todayStr() && <button onClick={() => setDate(todayStr())} className="text-[10px] font-mono text-green-500 mt-0.5">voltar para hoje</button>}
            </div>
            <button onClick={() => shiftDate(1)} className="px-2 text-zinc-400 hover:text-white font-mono">›</button>
          </div>

          <div className="mt-4 flex gap-1 bg-zinc-900 rounded-xl p-1 border border-zinc-800 overflow-x-auto">
            {[
              { id: "nutricao", label: "Nutrição", icon: Flame },
              { id: "treino", label: "Treino", icon: Dumbbell },
              { id: "evolucao", label: "Evolução", icon: TrendingUp },
              { id: "checkin", label: "Acompanhamento", icon: CalendarCheck },
            ].map(({ id, label, icon: Icon }) => (
              <button key={id} onClick={() => setTab(id)} className={`flex-1 min-w-[76px] flex items-center justify-center gap-1.5 py-2 rounded-lg text-[13px] font-medium transition ${tab === id ? "bg-zinc-800 text-white" : "text-zinc-500 hover:text-zinc-400"}`}>
                <Icon size={14} />{label}
              </button>
            ))}
          </div>
        </div>
      </header>

      <main className="max-w-2xl mx-auto px-5 pb-28">
        {tab === "nutricao" && (
          <NutricaoTab
            totals={totals}
            goals={macroGoals}
            dayMeals={dayMeals}
            onRemove={removeFood}
            onAdd={(mealId) => setAddFoodCtx({ mealId, editing: null })}
            onEdit={(mealId, food) => setAddFoodCtx({ mealId, editing: food })}
          />
        )}
        {tab === "treino" && (
          <TreinoTab
            plans={plans}
            dayData={trainingLog[date] || null}
            fullTrainingLog={trainingLog}
            customExercises={customExercises}
            onSaveCustomExercise={addCustomExercise}
            onRemoveCustomExercise={removeCustomExercise}
            onSaveDay={saveTrainingDay}
            onManagePlans={() => setShowPlanManager(true)}
          />
        )}
        {tab === "evolucao" && <EvolucaoTab evolutionLog={evolutionLog} date={date} heightCm={profile.heightCm} onSave={saveEvolutionDay} onDelete={deleteEvolutionDay} />}
        {tab === "checkin" && <CheckinTab date={date} foodLog={foodLog} trainingLog={trainingLog} evolutionLog={evolutionLog} kcalGoal={profile.kcal} />}
      </main>

      {showProfile && <ProfileModal profile={profile} onSave={saveProfile} onClose={() => setShowProfile(false)} />}
      {addFoodCtx && (
        <AddFoodModal
          editing={addFoodCtx.editing}
          onAdd={(food) => addFood(addFoodCtx.mealId, food)}
          onSaveEdit={(updated) => editFood(addFoodCtx.mealId, addFoodCtx.editing.id, updated)}
          customFoods={customFoods}
          onSaveCustomFood={addCustomFood}
          onRemoveCustomFood={removeCustomFood}
          onClose={() => setAddFoodCtx(null)}
        />
      )}
      {showPlanManager && <PlanManagerModal plans={plans} onChange={savePlans} onClose={() => setShowPlanManager(false)} />}
    </div>
  );
}

    <div className="pt-6">
      <div className="flex flex-col items-center"><CalorieDial consumed={totals.kcal} goal={goals.kcal} /></div>
      <div className="mt-6 flex gap-4">
        <MacroBar label="Proteína" consumed={totals.protein} goal={goals.protein} color="#22C55E" />
        <MacroBar label="Carbo" consumed={totals.carbs} goal={goals.carbs} color="#16A34A" />
        <MacroBar label="Gordura" consumed={totals.fat} goal={goals.fat} color="#FFFFFF" />
      </div>

      <div className="mt-8 flex flex-col gap-6">
        {MEALS.map((meal) => {
          const items = dayMeals[meal.id] || [];
          const mealKcal = items.reduce((s, f) => s + Number(f.kcal || 0), 0);
          return (
            <div key={meal.id}>
              <div className="flex items-center justify-between">
                <div>
                  <h2 className="font-display text-lg font-semibold tracking-tight">{meal.label}</h2>
                  {mealKcal > 0 && <span className="font-mono text-[11px] text-zinc-500">{Math.round(mealKcal)} kcal</span>}
                </div>
                <button onClick={() => onAdd(meal.id)} className="flex items-center gap-1 bg-green-500 text-black text-[13px] font-semibold px-3 py-1.5 rounded-lg hover:brightness-110 transition"><Plus size={14} /> Adicionar</button>
              </div>
              <div className="mt-2 divide-y divide-zinc-800 border-t border-b border-zinc-800">
                {items.length === 0 && <p className="py-4 text-center text-[12px] text-zinc-500 font-mono">nada lançado</p>}
                {items.map((f) => (
                  <div key={f.id} className="flex items-center justify-between py-3 group">
                    <button onClick={() => onEdit(meal.id, f)} className="text-left flex-1">
                      <p className="text-[14px] font-medium">{f.name}</p>
                      <p className="text-[11px] font-mono text-zinc-500">{f.kcal} kcal · P {f.protein}g · C {f.carbs}g · G {f.fat}g</p>
                    </button>
                    <button onClick={() => onRemove(meal.id, f.id)} className="text-zinc-500 active:text-white transition p-1" aria-label="Remover"><Trash2 size={15} /></button>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function AddFoodModal({ editing, onAdd, onSaveEdit, customFoods, onSaveCustomFood, onRemoveCustomFood, onClose }) {
  const [mode, setMode] = useState(editing ? "manual" : "buscar");

  // busca
  const [query, setQuery] = useState("");
  const [selected, setSelected] = useState(null);
  const [grams, setGrams] = useState("100");
  const allFoods = useMemo(() => [
    ...customFoods.map((f) => ({ ...f, custom: true })),
    ...FOOD_DB,
  ], [customFoods]);
  const results = useMemo(() => {
    if (!query.trim()) return allFoods.slice(0, 12);
    const q = normalize(query);
    return allFoods.filter((f) => normalize(f.name).includes(q)).slice(0, 20);
  }, [query, allFoods]);
  const scale = (Number(grams) || 0) / 100;
  const scaled = selected ? {
    kcal: Math.round(selected.kcal * scale),
    protein: Math.round(selected.protein * scale * 10) / 10,
    carbs: Math.round(selected.carbs * scale * 10) / 10,
    fat: Math.round(selected.fat * scale * 10) / 10,
  } : null;

  // manual
  const [form, setForm] = useState(editing
    ? { name: editing.name, kcal: String(editing.kcal), protein: String(editing.protein), carbs: String(editing.carbs), fat: String(editing.fat) }
    : { name: "", kcal: "", protein: "", carbs: "", fat: "" });
  const set = (k) => (e) => setForm({ ...form, [k]: e.target.value });
  const manualValid = form.name.trim() && form.kcal !== "";
  const [saveForReuse, setSaveForReuse] = useState(true);

  return (
    <Modal onClose={onClose} title={editing ? "Editar alimento" : "Adicionar alimento"}>
      {!editing && (
        <div className="flex gap-1 bg-black rounded-lg p-1 border border-zinc-800 mb-3">
          <button onClick={() => setMode("buscar")} className={`flex-1 py-1.5 rounded-md text-[13px] font-medium transition ${mode === "buscar" ? "bg-zinc-800 text-white" : "text-zinc-500"}`}>Buscar</button>
          <button onClick={() => setMode("manual")} className={`flex-1 py-1.5 rounded-md text-[13px] font-medium transition ${mode === "manual" ? "bg-zinc-800 text-white" : "text-zinc-500"}`}>Manual</button>
        </div>
      )}

      {mode === "buscar" ? (
        <div className="flex flex-col gap-3">
          {!selected ? (
            <>
              <input autoFocus value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Buscar alimento…" className="bg-black border border-zinc-700 rounded-lg px-3 py-2 text-[14px] focus:outline-none focus:border-green-500" />
              <div className="flex flex-col gap-1 max-h-[45vh] overflow-y-auto">
                {results.length === 0 && <p className="text-center text-[13px] text-zinc-500 font-mono py-6">nada encontrado — tente o modo manual</p>}
                {results.map((f) => (
                  <div key={f.id} className="flex items-center gap-1">
                    <button onClick={() => setSelected(f)} className="flex-1 flex items-center justify-between text-left bg-black hover:bg-zinc-800 border border-zinc-800 rounded-lg px-3 py-2 transition">
                      <span className="text-[13px]">{f.custom && <span className="text-green-600 font-mono text-[10px] mr-1.5">MEU</span>}{f.name}</span>
                      <span className="font-mono text-[11px] text-zinc-500">{f.kcal} kcal/100g</span>
                    </button>
                    {f.custom && (
                      <button onClick={() => onRemoveCustomFood(f.id)} className="text-zinc-500 hover:text-white p-1"><Trash2 size={14} /></button>
                    )}
                  </div>
                ))}
              </div>
            </>
          ) : (
            <>
              <div className="flex items-center justify-between bg-zinc-800 rounded-lg px-3 py-2.5 border border-zinc-800">
                <span className="text-[14px] font-medium">{selected.name}</span>
                <button onClick={() => setSelected(null)} className="text-zinc-500 hover:text-white"><X size={15} /></button>
              </div>
              <Field label="Quantidade (g)" value={grams} onChange={(e) => setGrams(e.target.value)} type="number" />
              <p className="font-mono text-[12px] text-zinc-400 bg-black border border-zinc-800 rounded-lg px-3 py-2">
                {scaled.kcal} kcal · P {scaled.protein}g · C {scaled.carbs}g · G {scaled.fat}g
              </p>
              <button onClick={() => { onAdd({ name: `${selected.name} (${grams}g)`, ...scaled }); onClose(); }} className="mt-1 bg-green-500 text-black font-semibold rounded-lg py-2.5 text-[14px] transition">Lançar alimento</button>
            </>
          )}
        </div>
      ) : (
        <div className="flex flex-col gap-3">
          <Field label="Nome" value={form.name} onChange={set("name")} placeholder="Ex: marmita da vovó" />
          <div className="grid grid-cols-2 gap-3">
            <Field label="Calorias (kcal)" value={form.kcal} onChange={set("kcal")} type="number" />
            <Field label="Proteína (g)" value={form.protein} onChange={set("protein")} type="number" />
            <Field label="Carboidrato (g)" value={form.carbs} onChange={set("carbs")} type="number" />
            <Field label="Gordura (g)" value={form.fat} onChange={set("fat")} type="number" />
          </div>
          {!editing && (
            <label className="flex items-center gap-2 text-[12px] font-mono text-zinc-400">
              <input type="checkbox" checked={saveForReuse} onChange={(e) => setSaveForReuse(e.target.checked)} className="accent-green-500" />
              salvar em "meus alimentos" pra reusar depois
            </label>
          )}
          <button
            disabled={!manualValid}
            onClick={() => {
              const food = { name: form.name.trim(), kcal: Number(form.kcal) || 0, protein: Number(form.protein) || 0, carbs: Number(form.carbs) || 0, fat: Number(form.fat) || 0 };
              if (editing) {
                onSaveEdit(food);
              } else {
                onAdd(food);
                if (saveForReuse) onSaveCustomFood(food);
              }
              onClose();
            }}
            className="mt-1 bg-green-500 disabled:bg-zinc-700 disabled:text-zinc-500 text-black font-semibold rounded-lg py-2.5 text-[14px] transition"
          >
            {editing ? "Salvar alterações" : "Lançar alimento"}
          </button>
        </div>
      )}
    </Modal>
  );
}

function RestTimer({ seconds }) {
  const [remaining, setRemaining] = useState(seconds);
  const [running, setRunning] = useState(false);
  const intervalRef = useRef(null);

  useEffect(() => { setRemaining(seconds); setRunning(false); }, [seconds]);

  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => {
        setRemaining((r) => {
          if (r <= 1) { clearInterval(intervalRef.current); setRunning(false); beep(); return 0; }
          return r - 1;
        });
      }, 1000);
    }
    return () => clearInterval(intervalRef.current);
  }, [running]);

  const mm = String(Math.floor(remaining / 60)).padStart(2, "0");
  const ss = String(remaining % 60).padStart(2, "0");

  return (
    <div className="flex items-center gap-2 bg-black border border-zinc-700 rounded-lg px-2.5 py-1.5">
      <span className="font-mono text-[13px] tabular-nums w-[46px]">{mm}:{ss}</span>
      <button onClick={() => setRunning((r) => !r)} className="text-zinc-400 hover:text-white">{running ? <Pause size={14} /> : <Play size={14} />}</button>
      <button onClick={() => { setRemaining(seconds); setRunning(false); }} className="text-zinc-500 hover:text-white"><RotateCcw size={13} /></button>
    </div>
  );
}

function TreinoTab({ plans, dayData, fullTrainingLog, customExercises, onSaveCustomExercise, onRemoveCustomExercise, onSaveDay, onManagePlans }) {
  const [planId, setPlanId] = useState(dayData?.planId || (plans[0]?.id ?? ""));
  const [progress, setProgress] = useState(dayData?.progress || {});
  const [adhoc, setAdhoc] = useState(dayData?.adhoc || []);
  const [showAddAdhoc, setShowAddAdhoc] = useState(false);

  useEffect(() => {
    setPlanId(dayData?.planId || (plans[0]?.id ?? ""));
    setProgress(dayData?.progress || {});
    setAdhoc(dayData?.adhoc || []);
  }, [dayData, plans]);

  const activePlan = plans.find((p) => p.id === planId);

  const persist = (next) => onSaveDay({ planId, progress: next.progress ?? progress, adhoc: next.adhoc ?? adhoc });

  const setExerciseWeight = (exId, weight) => {
    const next = { ...progress, [exId]: { ...(progress[exId] || {}), weight } };
    setProgress(next); persist({ progress: next });
  };
  const toggleSet = (exId, setIndex, totalSets) => {
    const current = progress[exId]?.doneSets || 0;
    const done = setIndex < current ? setIndex : setIndex + 1;
    const next = { ...progress, [exId]: { ...(progress[exId] || {}), doneSets: clamp(done, 0, totalSets) } };
    setProgress(next); persist({ progress: next });
  };
  const changePlan = (id) => { setPlanId(id); onSaveDay({ planId: id, progress, adhoc }); };
  const addAdhoc = (ex) => { const next = [...adhoc, { ...ex, id: uid() }]; setAdhoc(next); persist({ adhoc: next }); };
  const removeAdhoc = (id) => { const next = adhoc.filter((a) => a.id !== id); setAdhoc(next); persist({ adhoc: next }); };
  const exerciseHistory = useMemo(() => buildExerciseHistory(fullTrainingLog, plans), [fullTrainingLog, plans]);

  return (
    <div className="pt-6">
      <div className="flex items-center justify-between">
        <h2 className="font-display text-xl font-semibold tracking-tight">Treino de hoje</h2>
        <button onClick={onManagePlans} className="flex items-center gap-1 text-[12px] font-mono text-zinc-400 hover:text-white border border-zinc-700 rounded-lg px-2.5 py-1.5"><ClipboardList size={13} /> Planos</button>
      </div>

      {plans.length === 0 ? (
        <p className="mt-6 text-center text-[13px] text-zinc-500 font-mono py-8 border-t border-b border-zinc-800">
          nenhum plano criado — toque em "Planos" para montar seu treino A/B/C
        </p>
      ) : (
        <>
          <div className="mt-4 flex gap-2 overflow-x-auto pb-1">
            {plans.map((p) => (
              <button key={p.id} onClick={() => changePlan(p.id)} className={`px-3 py-1.5 rounded-lg text-[13px] font-medium whitespace-nowrap transition ${planId === p.id ? "bg-green-600 text-black" : "bg-zinc-800 text-zinc-400 border border-zinc-800"}`}>{p.name}</button>
            ))}
          </div>

          {activePlan && (
            <div className="mt-4 flex flex-col gap-3">
              {activePlan.exercises.map((ex) => {
                const done = progress[ex.id]?.doneSets || 0;
                return (
                  <div key={ex.id} className="bg-zinc-900 border border-zinc-800 rounded-xl p-3.5">
                    <div className="flex items-center justify-between">
                      <p className="text-[14px] font-medium">{ex.name}</p>
                      <span className="font-mono text-[11px] text-zinc-500">{ex.sets}x{ex.reps}</span>
                    </div>
                    <div className="mt-2.5 flex items-center justify-between flex-wrap gap-2">
                      <div className="flex gap-1.5">
                        {Array.from({ length: ex.sets }).map((_, i) => (
                          <button key={i} onClick={() => toggleSet(ex.id, i, ex.sets)} className={`w-7 h-7 rounded-md text-[11px] font-mono flex items-center justify-center border transition ${i < done ? "bg-green-600 border-green-600 text-black" : "border-zinc-700 text-zinc-500"}`}>{i + 1}</button>
                        ))}
                      </div>
                      <div className="flex items-center gap-2">
                        <input type="number" placeholder="kg" value={progress[ex.id]?.weight || ""} onChange={(e) => setExerciseWeight(ex.id, e.target.value)} className="w-16 bg-black border border-zinc-700 rounded-md px-2 py-1 text-[13px] font-mono focus:outline-none focus:border-green-500" />
                        {ex.restSeconds > 0 && <RestTimer seconds={ex.restSeconds} />}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </>
      )}

      <div className="mt-8 flex items-center justify-between">
        <h3 className="font-display text-lg font-semibold tracking-tight">Avulso</h3>
        <button onClick={() => setShowAddAdhoc(true)} className="flex items-center gap-1 bg-green-600 text-black text-[13px] font-semibold px-3 py-1.5 rounded-lg hover:brightness-110 transition"><Plus size={14} /> Exercício</button>
      </div>
      <div className="mt-3 divide-y divide-zinc-800 border-t border-b border-zinc-800">
        {adhoc.length === 0 && <p className="py-6 text-center text-[13px] text-zinc-500 font-mono">nada avulso hoje</p>}
        {adhoc.map((w) => (
          <div key={w.id} className="flex items-center justify-between py-3 group">
            <div><p className="text-[14px] font-medium">{w.name}</p><p className="text-[11px] font-mono text-zinc-500">{w.sets}x{w.reps} · {w.weight}kg</p></div>
            <button onClick={() => removeAdhoc(w.id)} className="text-zinc-500 active:text-white transition p-1"><Trash2 size={15} /></button>
          </div>
        ))}
      </div>

      {showAddAdhoc && (
        <AddExerciseModal
          exerciseHistory={exerciseHistory}
          customExercises={customExercises}
          onSaveCustomExercise={onSaveCustomExercise}
          onRemoveCustomExercise={onRemoveCustomExercise}
          onAdd={addAdhoc}
          onClose={() => setShowAddAdhoc(false)}
        />
      )}

      <ExerciseCarousel trainingLog={fullTrainingLog} plans={plans} />
    </div>
  );
}

function ExerciseCarousel({ trainingLog, plans }) {
  const history = useMemo(() => buildExerciseHistory(trainingLog, plans), [trainingLog, plans]);
  const entries = Object.entries(history).filter(([, arr]) => arr.length > 0);
  if (entries.length === 0) return null;
  return (
    <div className="mt-8">
      <h3 className="font-display text-lg font-semibold tracking-tight mb-2">Recordes por exercício</h3>
      <div className="flex gap-2 overflow-x-auto pb-1">
        {entries.map(([name, arr]) => {
          const last = arr[arr.length - 1];
          const first = arr[0];
          const delta = arr.length > 1 ? Math.round((last.weight - first.weight) * 10) / 10 : null;
          return (
            <div key={name} className="flex-shrink-0 w-36 bg-zinc-900 border border-zinc-800 rounded-xl p-3">
              <p className="text-[13px] font-medium truncate">{name}</p>
              <p className="font-mono text-xl font-semibold mt-1">{last.weight}<span className="text-[11px] text-zinc-500"> kg</span></p>
              <p className="font-mono text-[10px] text-zinc-500">{fmtShort(last.date)}</p>
              {delta !== null && (
                <p className={`font-mono text-[11px] mt-1 ${delta >= 0 ? "text-green-500" : "text-white"}`}>
                  {delta >= 0 ? "↑" : "↓"} {Math.abs(delta)}kg
                </p>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function AddExerciseModal({ onAdd, onClose, exerciseHistory, customExercises, onSaveCustomExercise, onRemoveCustomExercise }) {

  const results = useMemo(() => {
    const q = normalize(query);
    return customExercises.filter((e) => !q || normalize(e.name).includes(q)).slice(0, 20);
  }, [query, customExercises]);

  const history = selectedName ? (exerciseHistory[selectedName] || []) : [];

    const plan = { id: uid(), name: newPlanName.trim(), exercises: [] };

function PhotoCompare({ evolutionLog }) {
  const photoDates = Object.entries(evolutionLog).filter(([, v]) => v.photo).map(([d]) => d).sort();
  const [fromDate, setFromDate] = useState(photoDates[0] || "");
  const [toDate, setToDate] = useState(photoDates[photoDates.length - 1] || "");

  useEffect(() => {
    if (photoDates.length === 0) return;
    if (!photoDates.includes(fromDate)) setFromDate(photoDates[0]);
    if (!photoDates.includes(toDate)) setToDate(photoDates[photoDates.length - 1]);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [evolutionLog]);

  if (photoDates.length < 2) return null;

  const monthsBetween = (a, b) => {
    const days = Math.round((new Date(b + "T00:00:00") - new Date(a + "T00:00:00")) / 86400000);
    if (days < 30) return `${days} dias`;
    const months = Math.round(days / 30);
    return `${months} ${months === 1 ? "mês" : "meses"}`;
  };

  return (
    <div className="mt-8">
      <h3 className="font-display text-lg font-semibold tracking-tight mb-2">Comparar fotos</h3>
      <div className="relative rounded-xl overflow-hidden border border-zinc-800">
        <div className="flex">
          <img src={evolutionLog[fromDate].photo} alt={fromDate} className="w-1/2 h-56 object-cover" />
          <img src={evolutionLog[toDate].photo} alt={toDate} className="w-1/2 h-56 object-cover" />
        </div>
        <div className="absolute inset-x-0 bottom-0 flex justify-between items-end p-2 bg-black">
          <span className="font-mono text-[11px] text-white">{fmtShort(fromDate)}</span>
          <span className="font-mono text-[10px] bg-zinc-800 text-zinc-400 px-2 py-1 rounded-full border border-zinc-700">em {monthsBetween(fromDate, toDate)}</span>
          <span className="font-mono text-[11px] text-white">{fmtShort(toDate)}</span>
        </div>
      </div>
      <div className="mt-2 grid grid-cols-2 gap-2">
        <select value={fromDate} onChange={(e) => setFromDate(e.target.value)} className="bg-black border border-zinc-700 rounded-lg px-2 py-1.5 text-[12px] font-mono focus:outline-none focus:border-green-500">
          {photoDates.map((d) => <option key={d} value={d}>{fmtShort(d)}</option>)}
        </select>
        <select value={toDate} onChange={(e) => setToDate(e.target.value)} className="bg-black border border-zinc-700 rounded-lg px-2 py-1.5 text-[12px] font-mono focus:outline-none focus:border-green-500">
          {photoDates.map((d) => <option key={d} value={d}>{fmtShort(d)}</option>)}
        </select>
      </div>
    </div>
  );
}

function MeasurementCarousel({ evolutionLog }) {
  const sorted = Object.entries(evolutionLog).sort(([a], [b]) => a.localeCompare(b));
  const fields = [
    { key: "weight", label: "Peso", unit: "kg", goodDirection: null },
    { key: "waist", label: "Cintura", unit: "cm", goodDirection: "down" },
    { key: "neck", label: "Pescoço", unit: "cm", goodDirection: null },
    { key: "bodyFat", label: "% Gordura", unit: "%", goodDirection: "down" },
    { key: "chest", label: "Peito", unit: "cm", goodDirection: null },
    { key: "hip", label: "Quadril", unit: "cm", goodDirection: null },
    { key: "arm", label: "Braço", unit: "cm", goodDirection: null },
    { key: "thigh", label: "Coxa", unit: "cm", goodDirection: null },
  ];
  const cards = fields.map((f) => {
    const points = sorted.filter(([, v]) => v[f.key] != null && v[f.key] !== "").map(([d, v]) => ({ date: d, value: v[f.key] }));
    if (points.length === 0) return null;
    const last = points[points.length - 1];
    const first = points[0];
    const delta = points.length > 1 ? Math.round((last.value - first.value) * 10) / 10 : null;
    let color = "#FFFFFF";
    if (delta !== null && f.goodDirection) {
      const improved = f.goodDirection === "down" ? delta < 0 : delta > 0;
      color = improved ? "#22C55E" : "#FFFFFF";
    }
    return { ...f, last, delta, color };
  }).filter(Boolean);

  if (cards.length === 0) return null;

  return (
    <div className="mt-8">
      <h3 className="font-display text-lg font-semibold tracking-tight mb-2">Medidas</h3>
      <div className="flex gap-2 overflow-x-auto pb-1">
        {cards.map((c) => (
          <div key={c.key} className="flex-shrink-0 w-32 bg-zinc-900 border border-zinc-800 rounded-xl p-3">
            <p className="text-[12px] text-zinc-400">{c.label}</p>
            <p className="font-mono text-xl font-semibold mt-1">{c.last.value}<span className="text-[11px] text-zinc-500"> {c.unit}</span></p>
            <p className="font-mono text-[10px] text-zinc-500">{fmtShort(c.last.date)}</p>
            {c.delta !== null && (
              <p className="font-mono text-[11px] mt-1" style={{ color: c.color }}>
                {c.delta >= 0 ? "↑" : "↓"} {Math.abs(c.delta)}{c.unit}
              </p>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}
function CheckinTab({ date, foodLog, trainingLog, evolutionLog, kcalGoal }) {
  const dates = weekDates(date);

  const kcalByDate = {};
  Object.entries(foodLog).forEach(([d, items]) => {
    const sum = (items || []).reduce((s, f) => s + Number(f.kcal || 0), 0);
    if (sum > 0) kcalByDate[d] = sum;
  });
  const nutritionSuccessSet = new Set(
    Object.entries(kcalByDate).filter(([, k]) => Math.abs(k - kcalGoal) / kcalGoal <= 0.15).map(([d]) => d)
  );
  const weekKcalDays = dates.filter((d) => kcalByDate[d] != null);
  const avgKcal = weekKcalDays.length > 0 ? Math.round(weekKcalDays.reduce((s, d) => s + kcalByDate[d], 0) / weekKcalDays.length) : 0;
  const nutritionDots = dates.map((d) => (kcalByDate[d] == null ? "none" : nutritionSuccessSet.has(d) ? "success" : "fail"));
  const nutritionSuccessDaysWeek = dates.filter((d) => nutritionSuccessSet.has(d)).length;
  const nutritionMaxStreak = longestStreak(nutritionSuccessSet);

  const trainingSuccessSet = new Set(
    Object.entries(trainingLog)
      .filter(([, t]) => (t.adhoc && t.adhoc.length > 0) || (t.progress && Object.values(t.progress).some((p) => p.doneSets > 0)))
      .map(([d]) => d)
  );
  const trainingDots = dates.map((d) => (trainingSuccessSet.has(d) ? "success" : "none"));
  const trainingSuccessDaysWeek = dates.filter((d) => trainingSuccessSet.has(d)).length;
  const trainingMaxStreak = longestStreak(trainingSuccessSet);

  const weekEvo = dates.map((d) => evolutionLog[d]).filter(Boolean);
  const weights = weekEvo.filter((e) => e.weight).map((e) => e.weight);
  const weightDelta = weights.length > 1 ? Math.round((weights[weights.length - 1] - weights[0]) * 10) / 10 : null;

  const hasAnyData = Object.keys(kcalByDate).length > 0 || Object.keys(trainingLog).length > 0;

  return (
    <div className="pt-6 flex flex-col gap-4">
      <h2 className="font-display text-xl font-semibold tracking-tight">Semana de {fmtShort(dates[0])} a {fmtShort(dates[6])}</h2>

      <TrendCard title="Nutrição" current={avgKcal} goal={kcalGoal} unit="cal" weekDots={nutritionDots} successDays={nutritionSuccessDaysWeek} maxStreak={nutritionMaxStreak} />
      <TrendCard title="Treino" current={trainingSuccessDaysWeek} goal={7} unit="dias" weekDots={trainingDots} successDays={trainingSuccessDaysWeek} maxStreak={trainingMaxStreak} />

      {weightDelta !== null && (
        <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-3.5 flex items-center justify-between">
          <span className="font-mono text-[11px] uppercase tracking-wider text-zinc-500">Variação de peso na semana</span>
          <span className="font-mono text-[15px] font-semibold">{weightDelta > 0 ? "+" : ""}{weightDelta}kg</span>
        </div>
      )}

      {!hasAnyData && (
        <p className="mt-2 text-center text-[13px] text-zinc-500 font-mono py-8 border-t border-b border-zinc-800">
          registre alimentos e treinos na semana para ver seu check-in
        </p>
      )}
    </div>
  );
}

function TrendCard({ title, current, goal, unit, weekDots, successDays, maxStreak }) {
  const pct = goal > 0 ? Math.min(999, Math.round((current / goal) * 100)) : 0;
  return (
    <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-4">
      <p className="text-[15px] font-medium">{title}</p>
      <div className="mt-3 flex items-end justify-between">
        <div>
          <p className="font-mono text-3xl font-semibold">{current}<span className="text-[13px] text-zinc-500"> / {goal} {unit}</span></p>
          <p className="font-mono text-[10px] text-zinc-500 mt-0.5">Média diária</p>
        </div>
        <div className="text-right">
          <p className="font-mono text-xl font-semibold text-green-500">{pct}%</p>
          <p className="font-mono text-[10px] text-zinc-500">Comprometimento</p>
        </div>
      </div>
      <div className="mt-3 h-[6px] rounded-full bg-zinc-800 overflow-hidden">
        <div className="h-full bg-green-500 rounded-full transition-all duration-500" style={{ width: `${Math.min(100, pct)}%` }} />
      </div>
      <div className="mt-4 flex items-center justify-between">
        <div>
          <p className="font-mono text-[10px] text-zinc-500 uppercase tracking-wider">Dias de sucesso</p>
          <p className="font-mono text-lg font-semibold">{successDays}</p>
        </div>
        <div>
          <p className="font-mono text-[10px] text-zinc-500 uppercase tracking-wider">Sequência máxima</p>
          <p className="font-mono text-lg font-semibold">{maxStreak}</p>
        </div>
      </div>
      <div className="mt-3 flex gap-2">
        {weekDots.map((s, i) => (
          <div key={i} className={`flex-1 h-2.5 rounded-full ${s === "success" ? "bg-green-500" : s === "fail" ? "bg-zinc-700" : "bg-zinc-800"}`} />
        ))}
      </div>
    </div>
  );
}

// ---------- Profile modal ----------
function ProfileModal({ profile, onSave, onClose }) {
  const [form, setForm] = useState(profile);
  const set = (k) => (e) => setForm({ ...form, [k]: e.target.value });
  const refWeight = Number(form.refWeight) || 0;
  const kcal = Number(form.kcal) || 0;
  const proteinG = Math.round((Number(form.proteinPerKg) || 0) * refWeight);
  const fatG = Math.round((Number(form.fatPerKg) || 0) * refWeight);
  const carbsG = Math.max(0, Math.round((kcal - proteinG * 4 - fatG * 9) / 4));
  return (
    <Modal onClose={onClose} title="Perfil e metas">
      <div className="flex flex-col gap-3">
        <div className="grid grid-cols-2 gap-3">
          <Field label="Nome" value={form.name} onChange={set("name")} placeholder="Seu nome" />
          <Field label="Idade" value={form.age} onChange={set("age")} type="number" />
        </div>
        <div className="grid grid-cols-2 gap-3">
          <label className="flex flex-col gap-1">
            <span className="text-[11px] font-mono uppercase tracking-wider text-zinc-500">Objetivo</span>
            <select value={form.goal} onChange={set("goal")} className="bg-black border border-zinc-700 rounded-lg px-3 py-2 text-[14px] focus:outline-none focus:border-green-500">
              <option value="perda">Perda de peso</option>
              <option value="manutencao">Manutenção</option>
              <option value="ganho">Ganho de massa</option>
            </select>
          </label>
          <label className="flex flex-col gap-1">
            <span className="text-[11px] font-mono uppercase tracking-wider text-zinc-500">Atividade</span>
            <select value={form.activityLevel} onChange={set("activityLevel")} className="bg-black border border-zinc-700 rounded-lg px-3 py-2 text-[14px] focus:outline-none focus:border-green-500">
              <option value="sedentario">Sedentário</option>
              <option value="leve">Leve</option>
              <option value="moderado">Moderado</option>
              <option value="intenso">Intenso</option>
              <option value="muito_intenso">Muito intenso</option>
            </select>
          </label>
        </div>
        <Field label="Altura (cm)" value={form.heightCm} onChange={set("heightCm")} type="number" />
        <Field label="Peso de referência (kg)" value={form.refWeight} onChange={set("refWeight")} type="number" />
        <Field label="Meta de calorias diárias (kcal)" value={form.kcal} onChange={set("kcal")} type="number" />
        <div className="grid grid-cols-2 gap-3">
          <Field label="Proteína (g/kg)" value={form.proteinPerKg} onChange={set("proteinPerKg")} type="number" />
          <Field label="Gordura (g/kg)" value={form.fatPerKg} onChange={set("fatPerKg")} type="number" />
        </div>
        <div className="font-mono text-[11px] text-zinc-500 bg-black border border-zinc-800 rounded-lg px-3 py-2 flex flex-col gap-0.5">
          <span>proteína: {proteinG}g · gordura: {fatG}g</span>
          <span className="text-green-600">carboidrato (calculado do restante): {carbsG}g</span>
        </div>
        <button onClick={() => onSave({ ...form, heightCm: Number(form.heightCm) || 0, refWeight, kcal, proteinPerKg: Number(form.proteinPerKg) || 0, fatPerKg: Number(form.fatPerKg) || 0 })} className="mt-1 bg-green-500 text-black font-semibold rounded-lg py-2.5 text-[14px] hover:brightness-110 transition">Salvar perfil</button>
      </div>
    </Modal>
  );
}

// ---------- shared ----------
function Field({ label, value, onChange, type = "text", placeholder }) {
  return (
    <label className="flex flex-col gap-1">
      <span className="text-[11px] font-mono uppercase tracking-wider text-zinc-500">{label}</span>
      <input type={type} value={value} onChange={onChange} placeholder={placeholder} className="bg-black border border-zinc-700 rounded-lg px-3 py-2 text-[14px] focus:outline-none focus:border-green-500" />
    </label>
  );
}

function Modal({ title, children, onClose }) {
  return (
    <div className="fixed inset-0 bg-black flex items-end sm:items-center justify-center z-20 p-0 sm:p-4">
      <div className="bg-zinc-900 border border-zinc-700 rounded-t-2xl sm:rounded-2xl w-full sm:max-w-sm p-5 pb-8 sm:pb-5 max-h-[85vh] overflow-y-auto">
        <div className="flex items-center justify-between mb-4">
          <h3 className="font-display text-xl font-semibold">{title}</h3>
          <button onClick={onClose} className="text-zinc-500 hover:text-white"><X size={18} /></button>
        </div>
        {children}
      </div>
    </div>
  );
}
